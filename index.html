<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>무한의 계단</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="game-container">
    <header class="game-header">
      <div class="score-row">
        <span class="label">점수</span>
        <span id="score" class="value">0</span>
      </div>
      <div class="score-row">
        <span class="label">최고</span>
        <span id="high-score" class="value">0</span>
      </div>
    </header>

    <main class="game-main" id="game-main" tabindex="0">
      <canvas id="game-canvas" width="800" height="600"></canvas>
    </main>
  </div>

  <div id="gameover-overlay" class="overlay hidden">
    <div class="gameover-box">
      <p class="gameover-title">게임 오버</p>
      <p class="gameover-score">점수: <span id="gameover-score">0</span></p>
      <button type="button" id="btn-restart" class="control-btn restart-btn">다시 하기</button>
    </div>
  </div>

  <script src="js/game-bundle.js"></script>
</body>
</html>
